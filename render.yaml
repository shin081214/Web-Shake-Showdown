services:
  - type: web
    name: web-shake-showdown
    runtime: node
    plan: free
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend && npm ci --omit=dev --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
